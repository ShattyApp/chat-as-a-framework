<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shatty 2014 - Histórico de Conversas (v2)</title>
    <link rel="stylesheet" href="./shatty-2014.css" />
  </head>
  <body>
    <main class="history-shell" aria-label="Página inicial de histórico de conversas do Shatty">
      <header class="top-brand">
        <span class="orb" aria-hidden="true"></span>
        <h1>Plasmmer</h1>
        <span class="orb" aria-hidden="true"></span>
      </header>

      <section class="conversation-path">
        <span class="route-icon" aria-hidden="true">☞</span>
        <strong>Communicator</strong>
        <span class="separator">&gt;</span>
        <span>Conversas</span>
      </section>

      <nav class="tabs" aria-label="Atalhos de navegação">
        <button aria-label="Recentes">◷</button>
        <button aria-label="Lista">☰</button>
        <button aria-label="Contatos">👥</button>
        <button aria-label="Configurações">⚙</button>
      </nav>

      <section class="messages" aria-label="Histórico de conversas">
        <article class="msg-row green">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Ricardo ███████</h2>
            <div class="bubble">Oh ponha eu também</div>
            <time datetime="2014-07-30">30/07/2014</time>
          </div>
        </article>

        <article class="msg-row red">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Luan ████</h2>
            <div class="bubble">Só que eu tenho uma sugestão;</div>
            <time datetime="2014-07-30">30/07/2014</time>
          </div>
        </article>

        <article class="msg-row cyan">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Eduardo █████</h2>
            <div class="bubble gray">Verdade, esse suplemento...</div>
            <span class="photo-thumb" aria-hidden="true"></span>
            <time datetime="2014-07-30">30/07/2014</time>
          </div>
        </article>

        <article class="msg-row pink">
          <span class="avatar group">GRUPO DA ZOEIRA</span>
          <div class="bubble-wrap">
            <h2>Grupo da Zoeira</h2>
            <div class="bubble">Eduardo: HUEHUEBRBR</div>
            <time datetime="2014-07-30">30/07/2014</time>
          </div>
        </article>
      </section>

      <footer class="bottom-nav" aria-label="Navegação principal">
        <button aria-label="Menu">☷</button>
        <button class="home" aria-label="Home">⌂</button>
        <button aria-label="Voltar">↶</button>
      </footer>
    </main>
  </body>
</html>
