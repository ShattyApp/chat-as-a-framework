<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shatty 2014 GUI - Reconstruction v1</title>
    <link rel="stylesheet" href="./shatty-2014.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="Mockup estilo Shatty 2014">
      <header class="top-brand">
        <span class="orb"></span>
        <h1>Plasmmer</h1>
        <span class="orb"></span>
      </header>

      <section class="conversation-path">Communicator &gt; Conversas</section>

      <nav class="tabs" aria-label="Barra de abas">
        <button>◷</button>
        <button>☰</button>
        <button>👥</button>
        <button>⚙</button>
      </nav>

      <section class="messages" aria-label="Mensagens">
        <article class="msg-row incoming green">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Ricardo</h2>
            <div class="bubble">Oh ponha eu também</div>
            <time>30/07/2014</time>
          </div>
        </article>

        <article class="msg-row incoming red">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Luan</h2>
            <div class="bubble">Só que eu tenho uma sugestão;</div>
            <time>30/07/2014</time>
          </div>
        </article>

        <article class="msg-row incoming cyan">
          <span class="avatar"></span>
          <div class="bubble-wrap">
            <h2>Eduardo</h2>
            <div class="bubble gray">Verdade, esse suplemento...</div>
            <time>30/07/2014</time>
          </div>
        </article>

        <article class="msg-row incoming pink">
          <span class="avatar group">GRUPO DA ZOEIRA</span>
          <div class="bubble-wrap">
            <h2>Grupo da Zoeira</h2>
            <div class="bubble">Eduardo: HUEHUEBRBR</div>
            <time>30/07/2014</time>
          </div>
        </article>
      </section>

      <footer class="bottom-nav" aria-label="Navegação inferior">
        <button>☷</button>
        <button class="home">⌂</button>
        <button>↶</button>
      </footer>
    </main>
  </body>
</html>
